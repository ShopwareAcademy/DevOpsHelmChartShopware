apiVersion: v1
kind: Service
metadata:
  name: {{ include "shopware.fullname" . }}
  labels:
    {{- include "shopware.labels" . | nindent 4 }}
    app.kubernetes.io/component: shopware
spec:
  selector:
    {{- include "shopware.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: shopware
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
